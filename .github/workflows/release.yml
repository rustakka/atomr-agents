name: Release

# Releases are tagged from `main`. Push a tag matching `v*` (e.g.
# `v0.1.0`, `v1.0.0-rc.1`) to fire this pipeline. The bump-and-tag
# step is automated by `.github/workflows/version-bump.yml`.
#
# This workflow:
#   1. Verifies the workspace builds + tests cleanly.
#   2. Builds release binaries (`atomr-agents` from `atomr-agents-cli`)
#      for Linux x86_64 + aarch64, macOS x86_64 + aarch64, Windows x86_64.
#   3. Builds Python wheels + sdist via maturin.
#   4. Packages `ai-skills.tar.gz` for the Claude Code marketplace.
#   5. Creates the GitHub Release with the artifacts attached.
#   6. Publishes every allowlisted Rust crate to crates.io in
#      dependency order.
#   7. Publishes wheels + sdist to PyPI via OIDC trusted publishing.
#
# atomr-agents path-depends on the sibling atomr, atomr-infer, and
# atomr-accel workspaces. Every job that touches Cargo.toml checks
# all four out side-by-side under the runner's work directory.
#
# Allowlist:
#   The publish step honors a repo variable
#   `ATOMR_AGENTS_PUBLISH_ALLOWLIST` (space-separated crate names).
#   Default = the full 26-crate workspace in the order documented
#   in RELEASING.md. Set to the empty string to skip publish.

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to (re)release (e.g. v0.1.0)"
        required: true

permissions:
  contents: write
  id-token: write

env:
  CARGO_TERM_COLOR: always

jobs:
  verify:
    name: verify (build + test gate)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sibling atomr
        uses: actions/checkout@v4
        with: { repository: rustakka/atomr, path: atomr }
      - name: Checkout sibling atomr-infer
        uses: actions/checkout@v4
        with: { repository: rustakka/atomr-infer, path: atomr-infer }
      - name: Checkout sibling atomr-accel
        uses: actions/checkout@v4
        with: { repository: rustakka/atomr-accel, path: atomr-accel }
      - name: Checkout atomr-agents
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
          path: atomr-agents
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with: { workspaces: atomr-agents }
      - run: cargo check --workspace --all-features
        working-directory: atomr-agents
      - run: cargo test --workspace
        working-directory: atomr-agents

  build-binaries:
    name: build-binaries (${{ matrix.target }})
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - { target: x86_64-unknown-linux-gnu,  runner: ubuntu-latest,    ext: "" }
          # aarch64 Linux glibc — built natively on a GitHub-hosted ARM
          # runner (matches the upstream atomr v0.3.1 / atomr-infer v0.6.0
          # pattern). Native build avoids the ring / aws-lc-rs / openssl
          # cross-compile blockers that gcc-aarch64-linux-gnu alone can't
          # paper over, and dodges the cross-rs path-dep mount issue
          # documented in atomr-infer commit e8e35ee.
          - { target: aarch64-unknown-linux-gnu, runner: ubuntu-22.04-arm, ext: "" }
          - { target: x86_64-apple-darwin,       runner: macos-latest,     ext: "" }
          - { target: aarch64-apple-darwin,      runner: macos-latest,     ext: "" }
          - { target: x86_64-pc-windows-msvc,    runner: windows-latest,   ext: ".exe" }
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout sibling atomr
        uses: actions/checkout@v4
        with: { repository: rustakka/atomr, path: atomr }
      - name: Checkout sibling atomr-infer
        uses: actions/checkout@v4
        with: { repository: rustakka/atomr-infer, path: atomr-infer }
      - name: Checkout sibling atomr-accel
        uses: actions/checkout@v4
        with: { repository: rustakka/atomr-accel, path: atomr-accel }
      - name: Checkout atomr-agents
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
          path: atomr-agents
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: atomr-agents
          key: ${{ matrix.target }}
      - name: Build atomr-agents binary
        working-directory: atomr-agents
        run: cargo build --release -p atomr-agents-cli --target ${{ matrix.target }}
      - name: Stage artifact
        shell: bash
        working-directory: atomr-agents
        run: |
          set -euo pipefail
          name="atomr-agents-${{ matrix.target }}"
          mkdir -p "../dist"
          cp "target/${{ matrix.target }}/release/atomr-agents${{ matrix.ext }}" "../dist/${name}${{ matrix.ext }}"
          ls -la ../dist
      - uses: actions/upload-artifact@v4
        with:
          name: bin-${{ matrix.target }}
          path: dist/*

  build-wheels:
    name: build-wheels (${{ matrix.runner }})
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          # PyO3 0.22 supports up to Python 3.13. Pin to 3.11 explicitly
          # via setup-python; do NOT use `--find-interpreter` which would
          # pick up the runner's 3.14 (unsupported) on macOS / Windows.
          - { runner: ubuntu-latest,    args: "--release --out dist -i python3.11" }
          # Native aarch64-linux glibc wheel — built on a GitHub-hosted
          # ARM runner (mirrors atomr-infer v0.6.0). Native build avoids
          # the ring / aws-lc-rs cross-compile blocker that previously
          # forced ARM-Linux users to install from sdist.
          - { runner: ubuntu-22.04-arm, args: "--release --out dist -i python3.11" }
          - { runner: macos-latest,     args: "--release --out dist -i python3.11" }
          - { runner: windows-latest,   args: "--release --out dist -i python3.11" }
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout sibling atomr
        uses: actions/checkout@v4
        with: { repository: rustakka/atomr, path: atomr }
      - name: Checkout sibling atomr-infer
        uses: actions/checkout@v4
        with: { repository: rustakka/atomr-infer, path: atomr-infer }
      - name: Checkout sibling atomr-accel
        uses: actions/checkout@v4
        with: { repository: rustakka/atomr-accel, path: atomr-accel }
      - name: Checkout atomr-agents
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
          path: atomr-agents
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - uses: dtolnay/rust-toolchain@stable
      - name: Install maturin
        run: pip install maturin
      - name: Build wheels
        working-directory: atomr-agents
        run: maturin build --manifest-path crates/py-bindings/Cargo.toml ${{ matrix.args }}
      - name: Build sdist
        if: matrix.runner == 'ubuntu-latest'
        working-directory: atomr-agents
        run: maturin sdist --manifest-path crates/py-bindings/Cargo.toml --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.runner }}
          path: atomr-agents/dist/*

  package-skills:
    name: package ai-skills.tar.gz
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
      - name: Tar ai-skills/
        run: tar -czf ai-skills.tar.gz ai-skills/
      - uses: actions/upload-artifact@v4
        with: { name: ai-skills, path: ai-skills.tar.gz }

  github-release:
    name: GitHub Release
    needs: [build-binaries, build-wheels, package-skills]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Flatten + list artifacts
        run: |
          mkdir -p release
          find artifacts -type f \( -name 'atomr-agents-*' -o -name '*.whl' -o -name '*.tar.gz' \) -exec cp {} release/ \;
          ls -la release
      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          notes=$(awk "/^## \[Unreleased\]/{flag=1; next} flag && /^## /{exit} flag" CHANGELOG.md || true)
          if [ -z "$notes" ]; then
            notes="Release ${TAG}. See CHANGELOG.md for details."
          fi
          # Idempotent: create on first run; on retry, upload assets
          # to the existing release with --clobber to overwrite.
          if gh release view "$TAG" --json tagName >/dev/null 2>&1; then
            echo "release $TAG already exists; uploading assets with --clobber"
            gh release upload "$TAG" --clobber release/*
          else
            gh release create "$TAG" \
              --title "$TAG" \
              --notes "$notes" \
              release/*
          fi

  publish-crates:
    name: publish crates.io
    needs: github-release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sibling atomr
        uses: actions/checkout@v4
        with: { repository: rustakka/atomr, path: atomr }
      - name: Checkout sibling atomr-infer
        uses: actions/checkout@v4
        with: { repository: rustakka/atomr-infer, path: atomr-infer }
      - name: Checkout sibling atomr-accel
        uses: actions/checkout@v4
        with: { repository: rustakka/atomr-accel, path: atomr-accel }
      - name: Checkout atomr-agents
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
          path: atomr-agents
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with: { workspaces: atomr-agents }
      - name: Publish each crate in dep order
        working-directory: atomr-agents
        env:
          # Repo secret name is CRATES_IO_TOKEN (per gh secret list); cargo
          # itself reads CARGO_REGISTRY_TOKEN, so map it through.
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
          ALLOWLIST: ${{ vars.ATOMR_AGENTS_PUBLISH_ALLOWLIST }}
        run: |
          set -euo pipefail
          # Default = full 26-crate workspace, in dep order.
          default_order=(
            atomr-agents-core
            atomr-agents-callable
            atomr-agents-strategy
            atomr-agents-context
            atomr-agents-state
            atomr-agents-observability
            atomr-agents-tool
            atomr-agents-skill
            atomr-agents-memory
            atomr-agents-embed
            atomr-agents-retriever
            atomr-agents-ingest
            atomr-agents-persona
            atomr-agents-instruction
            atomr-agents-cache
            atomr-agents-parser
            atomr-agents-agent
            atomr-agents-workflow
            atomr-agents-harness
            atomr-agents-org
            atomr-agents-registry
            atomr-agents-eval
            atomr-agents-testkit
            atomr-agents-py-bindings
            atomr-agents-cli
            atomr-agents
          )
          if [ -n "${ALLOWLIST:-}" ]; then
            read -r -a list <<< "$ALLOWLIST"
          else
            list=("${default_order[@]}")
          fi
          if [ -z "${CARGO_REGISTRY_TOKEN:-}" ]; then
            echo "::error::CARGO_REGISTRY_TOKEN secret is empty"
            exit 1
          fi
          # crates.io rate-limits new crates at ~1/min for fresh
          # accounts/orgs. We pace the loop at 70s and retry on 429.
          PER_CRATE_SLEEP=70
          for crate in "${list[@]}"; do
            attempt=0
            while true; do
              attempt=$((attempt + 1))
              echo "==> publishing $crate (attempt $attempt)"
              if out=$(cargo publish -p "$crate" 2>&1); then
                echo "$out"
                break
              fi
              echo "$out"
              if printf '%s' "$out" | grep -qE 'crate version .* is already uploaded|already exists'; then
                echo "::warning::$crate already on crates.io at this version; skipping"
                break
              fi
              # 429 from crates.io. The new-crate rate limit is ~1
              # per 10 minutes for fresh accounts/orgs after the burst
              # window — so wait at least 10 min, regardless of what
              # the response says (the timestamp parsed out of the
              # body has been observed to be too optimistic).
              if printf '%s' "$out" | grep -q '429 Too Many Requests'; then
                if [ "$attempt" -ge 12 ]; then
                  echo "::error::rate-limited too many times on $crate"
                  exit 1
                fi
                wait=620   # 10 min + 20s slack
                echo "rate-limited; sleeping ${wait}s before retrying $crate (attempt $attempt/12)"
                sleep "$wait"
                continue
              fi
              echo "::error::cargo publish failed for $crate"
              exit 1
            done
            # Pace between crates so we don't tickle the new-crate rate
            # limit, and so the index has time to propagate before the
            # next dependent crate's resolver picks it up.
            sleep "$PER_CRATE_SLEEP"
          done

  publish-pypi:
    name: publish PyPI
    needs: github-release
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/atomr-agents
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: wheels-*
          merge-multiple: true
      - name: List wheels
        run: ls -la artifacts
      - uses: pypa/gh-action-pypi-publish@release/v1
        with: { packages-dir: artifacts }
