name: Release

# Releases are tagged from `main`. There are two ways to fire this
# pipeline:
#   1. Push a tag matching `v*` directly (e.g. `git push origin v0.1.0`).
#   2. `workflow_dispatch` against a `v*` tag ref. This is how
#      `version-bump.yml` triggers a publish — tag pushes authored by
#      the default `GITHUB_TOKEN` do NOT fire `on: push: tags` workflows
#      (a long-standing GitHub safety feature), so the bump job calls
#      `gh workflow run release.yml --ref vX.Y.Z -f dry_run=false`
#      after pushing the tag.
#
# This workflow:
#   1. Runs the verify gate (build + test) so a tag never ships an
#      untested build.
#   2. Builds release binaries (`atomr-agents` from `atomr-agents-cli`)
#      for Linux x86_64 + aarch64, macOS x86_64 + aarch64, Windows x86_64.
#   3. Builds Python wheels (manylinux + musllinux for x86_64/aarch64,
#      macOS, Windows) covering CPython 3.10–3.13 via maturin's
#      `--interpreter` flag, plus a single sdist.
#   4. Packages `ai-skills.tar.gz` for the Claude Code marketplace.
#   5. Creates the GitHub Release with the artifacts attached.
#   6. Publishes every publishable Rust crate to crates.io in
#      dependency order. Honors `--dry-run` for `workflow_dispatch`.
#   7. Publishes wheels + sdist to PyPI via OIDC trusted publishing
#      (or TestPyPI for dry-runs).

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run cargo publish + maturin upload with --dry-run; skip GitHub Release upload"
        required: false
        default: "true"
      skip_python:
        description: "Skip the Python wheel build/publish jobs"
        required: false
        default: "false"
      skip_crates:
        description: "Skip the crates.io publish job"
        required: false
        default: "false"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  verify:
    name: verify (build + test gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      # System deps for the heaviest opt-in features we exercise
      # below: cpal needs `libasound2-dev` (`stt-mic`), whisper-rs
      # needs cmake (`whisper-cpp`). The `metal`/`coreml`/`cuda`
      # GPU forwarders on stt-runtime-whisper are macOS/CUDA-only
      # and intentionally NOT exercised here.
      - name: Install system deps for opt-in features
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev cmake
      # Default features: matches what plain `cargo build` users see.
      - run: cargo check --workspace
      # Umbrella `full` feature: enables every framework + STT
      # capability surface that doesn't require a platform-specific
      # toolchain (excludes whisper-cpp/metal/coreml/cuda).
      - run: cargo check -p atomr-agents --features full
      # Spot-check the opt-in heavy features individually so we
      # catch breakage without enabling cross-platform feature
      # combinations cargo can't satisfy on Linux.
      - run: cargo check -p atomr-agents-stt-runtime-whisper --features whisper-cpp
      - run: cargo check -p atomr-agents-stt-audio --features mic
      - run: cargo check -p atomr-agents-stt-voice --features vad-silero
      # Text-to-speech capability — exercise the full surface and the
      # opt-in features individually.
      - run: cargo check -p atomr-agents --features tts-full
      - run: cargo check -p atomr-agents --features conversation
      - run: cargo check -p atomr-agents-tts-audio --features speaker
      - run: cargo test --workspace

  build-binaries:
    name: build-binaries (${{ matrix.target }})
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - { target: x86_64-unknown-linux-gnu,  runner: ubuntu-latest,    archive_ext: tar.gz }
          # aarch64 Linux glibc — built natively on a GitHub-hosted ARM
          # runner. Native build avoids the ring / aws-lc-rs / openssl
          # cross-compile blockers and dodges the cross-rs path-dep
          # mount issue documented in the atomr-infer history.
          - { target: aarch64-unknown-linux-gnu, runner: ubuntu-22.04-arm, archive_ext: tar.gz }
          - { target: x86_64-apple-darwin,       runner: macos-latest,     archive_ext: tar.gz }
          - { target: aarch64-apple-darwin,      runner: macos-latest,     archive_ext: tar.gz }
          - { target: x86_64-pc-windows-msvc,    runner: windows-latest,   archive_ext: zip,    bin_ext: .exe }
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - name: Build atomr-agents binary
        run: cargo build --release -p atomr-agents-cli --target ${{ matrix.target }}
      - name: Stage artifact (unix)
        if: matrix.archive_ext == 'tar.gz'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts
          src="target/${{ matrix.target }}/release/atomr-agents"
          [ -f "$src" ] && cp "$src" "artifacts/atomr-agents-${{ matrix.target }}"
          (cd artifacts && tar czf "atomr-agents-${{ matrix.target }}.tar.gz" "atomr-agents-${{ matrix.target }}")
          ls -la artifacts
      - name: Stage artifact (windows)
        if: matrix.archive_ext == 'zip'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          $src = "target/${{ matrix.target }}/release/atomr-agents${{ matrix.bin_ext }}"
          if (Test-Path $src) { Copy-Item $src "artifacts/atomr-agents-${{ matrix.target }}${{ matrix.bin_ext }}" }
          Compress-Archive -Path "artifacts/atomr-agents-${{ matrix.target }}*" -DestinationPath "artifacts/atomr-agents-${{ matrix.target }}.zip"
      - uses: actions/upload-artifact@v4
        with:
          name: bin-${{ matrix.target }}
          path: artifacts/atomr-agents-${{ matrix.target }}.${{ matrix.archive_ext }}

  build-wheels:
    name: build-wheels (${{ matrix.target }} / ${{ matrix.runner }})
    needs: verify
    if: github.event_name == 'push' || github.event.inputs.skip_python != 'true'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux glibc + musl, x86_64 + aarch64. maturin uses
          # manylinux/musllinux containers under the hood; the
          # `manylinux: auto` flag picks the right base image.
          - { runner: ubuntu-latest,    target: x86_64-unknown-linux-gnu,    python-target: x86_64,     manylinux: auto }
          # aarch64 Linux glibc — built natively on a GitHub-hosted
          # ARM runner so we don't have to cross-compile `ring` /
          # `aws-lc-rs` inside the x86_64 manylinux container.
          - { runner: ubuntu-22.04-arm, target: aarch64-unknown-linux-gnu,   python-target: aarch64,    manylinux: auto }
          - { runner: ubuntu-latest,    target: x86_64-unknown-linux-musl,   python-target: x86_64,     manylinux: musllinux_1_2 }
          # aarch64 Linux musl — also built natively on the ARM
          # runner, mirroring the glibc coverage.
          - { runner: ubuntu-22.04-arm, target: aarch64-unknown-linux-musl,  python-target: aarch64,    manylinux: musllinux_1_2 }
          # macOS — universal2 yields a single fat wheel covering
          # both x86_64 and arm64 architectures.
          - { runner: macos-latest,     target: universal2-apple-darwin,     python-target: universal2, manylinux: "off" }
          - { runner: windows-latest,   target: x86_64-pc-windows-msvc,      python-target: x64,        manylinux: "off" }
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build wheels (maturin)
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.python-target }}
          # Build a wheel per supported CPython ABI on this platform.
          # PyO3 0.22 supports CPython 3.10–3.13.
          args: --release --strip --out dist --interpreter "python3.10 python3.11 python3.12 python3.13"
          # `auto` builds inside a manylinux container; `off` runs natively.
          manylinux: ${{ matrix.manylinux }}
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.target }}
          path: dist/*.whl

  build-sdist:
    name: build-sdist (Python)
    needs: verify
    if: github.event_name == 'push' || github.event.inputs.skip_python != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  package-skills:
    name: package ai-skills.tar.gz
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Tar ai-skills/
        run: tar -czf ai-skills.tar.gz ai-skills/
      - uses: actions/upload-artifact@v4
        with: { name: ai-skills, path: ai-skills.tar.gz }

  github-release:
    name: GitHub Release
    needs: [verify, build-binaries, build-wheels, build-sdist, package-skills]
    runs-on: ubuntu-latest
    # Run for direct tag pushes AND for `workflow_dispatch` runs
    # targeting a `v*` ref with `dry_run=false` (the trampoline
    # path used by `version-bump.yml`).
    if: |
      startsWith(github.ref, 'refs/tags/v') &&
      (github.event_name == 'push' ||
       (github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run != 'true'))
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Flatten + list artifacts
        run: |
          mkdir -p release
          find artifacts -type f \( -name 'atomr-agents-*' -o -name '*.whl' -o -name '*.tar.gz' -o -name '*.zip' \) -exec cp {} release/ \;
          ls -la release
      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          notes=$(awk "/^## \[Unreleased\]/{flag=1; next} flag && /^## /{exit} flag" CHANGELOG.md || true)
          if [ -z "$notes" ]; then
            notes="Release ${TAG}. See CHANGELOG.md for details."
          fi
          # Idempotent: create on first run; on retry, upload assets
          # to the existing release with --clobber to overwrite.
          if gh release view "$TAG" --json tagName >/dev/null 2>&1; then
            echo "release $TAG already exists; uploading assets with --clobber"
            gh release upload "$TAG" --clobber release/*
          else
            gh release create "$TAG" \
              --title "$TAG" \
              --notes "$notes" \
              release/*
          fi

  publish-crates:
    name: publish crates.io
    needs: [verify, github-release]
    runs-on: ubuntu-latest
    if: |
      startsWith(github.ref, 'refs/tags/v') &&
      github.event.inputs.skip_crates != 'true' &&
      (github.event_name == 'push' ||
       (github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run != 'true'))
    permissions:
      contents: read
    env:
      # Repo secret name is CRATES_IO_TOKEN; cargo itself reads
      # CARGO_REGISTRY_TOKEN, so map it through.
      CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
      ALLOWLIST: ${{ vars.ATOMR_AGENTS_PUBLISH_ALLOWLIST }}
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      # Walk every publishable crate in dependency order. Each
      # `cargo publish` waits briefly for the index to become visible
      # before moving on, so the next crate can resolve its
      # path-dependencies from crates.io. `already uploaded` is
      # treated as success so a partially-completed run can be
      # safely retried by re-tagging.
      - name: Publish each crate in dep order
        run: |
          set -euo pipefail
          # Default = full workspace, in dep order. STT capability
          # crates (atomr-agents-stt-*) and TTS capability crates
          # (atomr-agents-tts-*) slot in just before py-bindings
          # since py-bindings depends on them.
          default_order=(
            atomr-agents-core
            atomr-agents-callable
            atomr-agents-strategy
            atomr-agents-context
            atomr-agents-state
            atomr-agents-observability
            atomr-agents-tool
            atomr-agents-skill
            atomr-agents-memory
            atomr-agents-embed
            atomr-agents-retriever
            atomr-agents-ingest
            atomr-agents-persona
            atomr-agents-instruction
            atomr-agents-cache
            atomr-agents-parser
            atomr-agents-agent
            atomr-agents-workflow
            atomr-agents-harness
            atomr-agents-org
            atomr-agents-registry
            atomr-agents-eval
            atomr-agents-testkit
            # --- speech-to-text capability ---------------------------
            atomr-agents-stt-core
            atomr-agents-stt-remote-core
            atomr-agents-stt-audio
            atomr-agents-stt-runtime-openai
            atomr-agents-stt-runtime-deepgram
            atomr-agents-stt-runtime-assemblyai
            atomr-agents-stt-runtime-whisper
            atomr-agents-stt-diarize-sherpa
            atomr-agents-stt-voice
            atomr-agents-stt-tool
            # --- text-to-speech capability ---------------------------
            atomr-agents-tts-core
            atomr-agents-tts-audio
            atomr-agents-tts-runtime-openai
            atomr-agents-tts-runtime-elevenlabs
            atomr-agents-tts-runtime-openai-realtime
            atomr-agents-tts-runtime-gemini-live
            atomr-agents-tts-runtime-piper
            atomr-agents-tts-runtime-kokoro
            atomr-agents-tts-runtime-moss
            atomr-agents-tts-runtime-xtts
            atomr-agents-tts-voice
            atomr-agents-tts-tool
            # ---------------------------------------------------------
            atomr-agents-py-bindings
            atomr-agents-cli
            atomr-agents
          )
          if [ -n "${ALLOWLIST:-}" ]; then
            read -r -a list <<< "$ALLOWLIST"
          else
            list=("${default_order[@]}")
          fi
          if [ -z "${CARGO_REGISTRY_TOKEN:-}" ]; then
            echo "::error::CARGO_REGISTRY_TOKEN secret is empty"
            exit 1
          fi
          # crates.io rate-limits new crates at ~1/min for fresh
          # accounts/orgs. We pace the loop at 70s and retry on 429.
          PER_CRATE_SLEEP=70
          publish_one() {
            local crate=$1
            local attempt=0
            while true; do
              attempt=$((attempt + 1))
              echo "==> publishing $crate (attempt $attempt)"
              if out=$(cargo publish -p "$crate" 2>&1); then
                echo "$out"
                return 0
              fi
              echo "$out"
              if printf '%s' "$out" | grep -qE 'crate version .* is already uploaded|already exists'; then
                echo "::warning::$crate already on crates.io at this version; skipping"
                return 0
              fi
              # 429 from crates.io. The new-crate rate limit is
              # ~1 per 10 minutes for fresh accounts/orgs after the
              # burst window — wait at least 10 min, regardless of
              # what the response body claims (its timestamp has
              # been observed to be too optimistic).
              if printf '%s' "$out" | grep -q '429 Too Many Requests'; then
                if [ "$attempt" -ge 12 ]; then
                  echo "::error::rate-limited too many times on $crate"
                  return 1
                fi
                local wait=620   # 10 min + 20s slack
                echo "rate-limited; sleeping ${wait}s before retrying $crate (attempt $attempt/12)"
                sleep "$wait"
                continue
              fi
              echo "::error::cargo publish failed for $crate"
              return 1
            done
          }
          for crate in "${list[@]}"; do
            publish_one "$crate"
            # Pace between crates so we don't tickle the new-crate
            # rate limit, and so the index has time to propagate
            # before the next dependent crate's resolver picks it up.
            sleep "$PER_CRATE_SLEEP"
          done

  publish-crates-dry-run:
    name: publish crates.io (dry run)
    needs: verify
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'true' && github.event.inputs.skip_crates != 'true'
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Dry-run publish (foundation + leaf crates)
        run: |
          # Spot-check a representative subset (foundation crates that
          # everything else depends on, plus the leaf crates). A full
          # 48-crate dry-run takes >15min and burns runner time; this
          # subset catches the vast majority of metadata regressions.
          for c in atomr-agents-core atomr-agents-callable atomr-agents-strategy \
                   atomr-agents-context atomr-agents-state atomr-agents-observability \
                   atomr-agents-tool atomr-agents-skill atomr-agents-memory \
                   atomr-agents-stt-core atomr-agents-tts-core \
                   atomr-agents-py-bindings atomr-agents-cli atomr-agents; do
            echo "==> $c"
            cargo publish -p "$c" --dry-run --allow-dirty || true
          done

  publish-pypi:
    name: publish PyPI
    needs: [verify, build-wheels, build-sdist, github-release]
    runs-on: ubuntu-latest
    if: |
      startsWith(github.ref, 'refs/tags/v') &&
      github.event.inputs.skip_python != 'true' &&
      (github.event_name == 'push' ||
       (github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run != 'true'))
    # Trusted publishing — configure on PyPI: pypi.org → manage project →
    # publishing → add GitHub publisher (owner / repo / workflow / env).
    environment:
      name: pypi
      url: https://pypi.org/p/atomr-agents
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          # Only Python artifacts — binary tarballs share the
          # `*.tar.gz` extension with the sdist but are not valid
          # PyPI uploads, so download just the wheel + sdist
          # artifact buckets.
          pattern: "{wheels-*,sdist}"
      - name: Flatten wheel + sdist artifacts
        run: |
          mkdir -p upload
          find dist -type f \( -name "*.whl" -o -name "*.tar.gz" \) -exec cp {} upload/ \;
          ls -la upload/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: upload
          # If trusted publishing is not yet configured, set
          # `password: ${{ secrets.PYPI_API_TOKEN }}` instead.
          skip-existing: true

  publish-pypi-dry-run:
    name: PyPI dry-run (TestPyPI)
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'true' && github.event.inputs.skip_python != 'true'
    environment:
      name: testpypi
      url: https://test.pypi.org/p/atomr-agents
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: "{wheels-*,sdist}"
      - name: Flatten wheel + sdist artifacts
        run: |
          mkdir -p upload
          find dist -type f \( -name "*.whl" -o -name "*.tar.gz" \) -exec cp {} upload/ \;
          ls -la upload/
      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: upload
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true
