[package]
name          = "atomr-agents-tool"
version       = { workspace = true }
edition       = { workspace = true }
rust-version  = { workspace = true }
license       = { workspace = true }
repository    = { workspace = true }
homepage      = { workspace = true }
authors       = { workspace = true }
description   = "Tool trait, ToolSet, registry, permission spec, and tool-call parsers."

keywords      = ["agents", "tool-calling", "atomr", "ai", "llm"]
categories    = ["asynchronous", "api-bindings"]
readme        = "../../README.md"

[dependencies]
atomr-agents-core     = { workspace = true }
atomr-agents-strategy = { workspace = true }
atomr-agents-callable = { workspace = true }
atomr-core            = { workspace = true }
async-trait           = { workspace = true }
serde                 = { workspace = true }
serde_json            = { workspace = true }
thiserror             = { workspace = true }
semver                = { workspace = true }
parking_lot           = { workspace = true }
dashmap               = { workspace = true }

[dev-dependencies]
tokio = { workspace = true }

[features]
default     = ["openai", "anthropic"]
openai      = []
anthropic   = []
gemini      = []
