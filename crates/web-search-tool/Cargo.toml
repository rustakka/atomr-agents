[package]
name          = "atomr-agents-web-search-tool"
version       = { workspace = true }
edition       = { workspace = true }
rust-version  = { workspace = true }
license       = { workspace = true }
repository    = { workspace = true }
homepage      = { workspace = true }
authors       = { workspace = true }
description   = "Generic `Tool` wrapper that exposes any `WebSearch` provider to atomr-agents agents and harnesses."

keywords      = ["agents", "tool", "web-search", "atomr"]
categories    = ["asynchronous"]
readme        = "README.md"

[dependencies]
atomr-agents-core             = { workspace = true }
atomr-agents-tool             = { workspace = true }
atomr-agents-web-search-core  = { workspace = true }

async-trait = { workspace = true }
serde       = { workspace = true }
serde_json  = { workspace = true }

[dev-dependencies]
atomr-agents-callable = { workspace = true }
tokio                 = { workspace = true, features = ["macros", "rt"] }
url                   = { workspace = true }
