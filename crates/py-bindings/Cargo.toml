[package]
name          = "atomr-agents-py-bindings"
version       = { workspace = true }
edition       = { workspace = true }
rust-version  = { workspace = true }
license       = { workspace = true }
repository    = { workspace = true }
homepage      = { workspace = true }
authors       = { workspace = true }
description   = "PyO3 bindings: host (run harnesses) and guest (Python-defined tools/strategies)."

keywords      = ["agents", "python", "pyo3", "atomr", "ai"]
categories    = ["asynchronous", "api-bindings"]
readme        = "../../README.md"

[lib]
# Must match the maturin `module-name = "atomr_agents._native"` so the
# cdylib emits PyInit__native. Mirrors atomr-pycore's `name = "_native"`.
name       = "_native"
crate-type = ["cdylib", "rlib"]

[dependencies]
# atomr-agents internal crates (full surface for Python parity wave).
atomr-agents-core          = { workspace = true }
atomr-agents-callable      = { workspace = true }
atomr-agents-context       = { workspace = true }
atomr-agents-state         = { workspace = true }
atomr-agents-strategy      = { workspace = true }
atomr-agents-tool          = { workspace = true }
atomr-agents-skill         = { workspace = true }
atomr-agents-persona       = { workspace = true }
atomr-agents-instruction   = { workspace = true }
atomr-agents-memory        = { workspace = true }
atomr-agents-embed         = { workspace = true }
atomr-agents-stt-core              = { workspace = true }
atomr-agents-stt-remote-core       = { workspace = true }
atomr-agents-stt-audio             = { workspace = true }
atomr-agents-stt-runtime-openai    = { workspace = true }
atomr-agents-stt-runtime-deepgram  = { workspace = true }
atomr-agents-stt-runtime-assemblyai = { workspace = true }
atomr-agents-stt-runtime-whisper   = { workspace = true }
atomr-agents-stt-voice             = { workspace = true }
atomr-agents-stt-diarize-sherpa    = { workspace = true }
atomr-agents-stt-tool              = { workspace = true }
atomr-agents-stt-harness           = { workspace = true, features = ["decode"] }
atomr-agents-coding-cli-core       = { workspace = true }
atomr-agents-coding-cli-harness    = { workspace = true }
atomr-agents-tts-core              = { workspace = true }
atomr-agents-tts-audio             = { workspace = true }
atomr-agents-tts-runtime-openai    = { workspace = true }
atomr-agents-tts-runtime-elevenlabs       = { workspace = true }
atomr-agents-tts-runtime-openai-realtime  = { workspace = true }
atomr-agents-tts-runtime-gemini-live      = { workspace = true }
atomr-agents-tts-runtime-piper     = { workspace = true }
atomr-agents-tts-runtime-kokoro    = { workspace = true }
atomr-agents-tts-runtime-moss      = { workspace = true }
atomr-agents-tts-runtime-xtts      = { workspace = true }
atomr-agents-tts-voice             = { workspace = true }
atomr-agents-tts-tool              = { workspace = true }
atomr-agents-retriever     = { workspace = true }
atomr-agents-ingest        = { workspace = true }
atomr-agents-parser        = { workspace = true }
atomr-agents-cache         = { workspace = true }
atomr-agents-agent         = { workspace = true }
atomr-agents-workflow      = { workspace = true }
atomr-agents-harness       = { workspace = true }
atomr-agents-org           = { workspace = true }
atomr-agents-registry      = { workspace = true }
atomr-agents-eval          = { workspace = true }
atomr-agents-observability = { workspace = true }
atomr-agents-testkit       = { workspace = true }
# atomr-infer types are re-exported through atomr_agents_core::inference,
# but a direct dep makes the import paths in agent.rs / cache.rs clearer.
atomr-infer-core           = { workspace = true }

# Audio I/O.
bytes                      = { workspace = true }
url                        = { workspace = true }

# PyO3 + tokio bridge.
pyo3                       = { workspace = true, features = ["extension-module"] }
pyo3-async-runtimes        = { workspace = true }
tokio                      = { workspace = true }
async-trait                = { workspace = true }
futures                    = { workspace = true }
parking_lot                = { workspace = true }
dashmap                    = { workspace = true }
once_cell                  = { workspace = true }

# Serialization / time.
serde                      = { workspace = true }
serde_json                 = { workspace = true }
semver                     = { workspace = true }
chrono                     = { workspace = true }

[features]
default = []
# Forwarders that enable optional native deps in the linked stt
# backend crates. Build with e.g.
# `maturin develop --features stt-whisper-cpp` to link whisper.cpp.
stt-whisper-cpp = ["atomr-agents-stt-runtime-whisper/whisper-cpp"]
stt-mic         = ["atomr-agents-stt-audio/mic", "atomr-agents-stt-harness/mic"]
stt-vad-silero  = ["atomr-agents-stt-voice/vad-silero"]
stt-diarize-sherpa-onnx = ["atomr-agents-stt-diarize-sherpa/sherpa-onnx"]
# STT harness persistence through the configured `crates/state` backend.
stt-harness-state = ["atomr-agents-stt-harness/state"]
# LLM cache backends.
cache-sqlite    = ["atomr-agents-cache/sqlite"]
cache-redis     = ["atomr-agents-cache/redis"]
# Checkpointer backends — forward to atomr-agents-state feature flags.
state-sqlite    = ["atomr-agents-state/sqlite"]
state-postgres  = ["atomr-agents-state/postgres"]
