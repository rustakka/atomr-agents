[package]
name          = "atomr-agents-stt-runtime-deepgram"
version       = { workspace = true }
edition       = { workspace = true }
rust-version  = { workspace = true }
license       = { workspace = true }
repository    = { workspace = true }
homepage      = { workspace = true }
authors       = { workspace = true }
description   = "Deepgram STT backend (REST + WebSocket) for atomr-agents."

keywords      = ["agents", "stt", "deepgram", "speech", "atomr"]
categories    = ["asynchronous", "multimedia::audio"]
readme        = "../../README.md"

[features]
default     = ["rustls"]
rustls      = ["atomr-agents-stt-remote-core/rustls"]
native-tls  = ["atomr-agents-stt-remote-core/native-tls"]
integration = []

[dependencies]
atomr-agents-stt-core         = { workspace = true }
atomr-agents-stt-remote-core  = { workspace = true }

reqwest             = { workspace = true }
tokio               = { workspace = true, features = ["sync", "rt", "macros"] }
tokio-tungstenite   = { workspace = true, features = ["connect"] }
async-trait         = { workspace = true }
futures             = { workspace = true }
futures-util        = { workspace = true }
bytes               = { workspace = true }
serde               = { workspace = true }
serde_json          = { workspace = true }
secrecy             = { workspace = true }
url                 = { workspace = true }
tracing             = { workspace = true }
parking_lot         = { workspace = true }

[dev-dependencies]
tokio = { workspace = true }
