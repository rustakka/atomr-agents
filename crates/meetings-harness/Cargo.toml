[package]
name          = "atomr-agents-meetings-harness"
version       = { workspace = true }
edition       = { workspace = true }
rust-version  = { workspace = true }
license       = { workspace = true }
repository    = { workspace = true }
homepage      = { workspace = true }
authors       = { workspace = true }
description   = "Meetings harness: takes a diarized STT conversation and produces structured attendees, notes, and actions with owners. Supports batch and live-streaming extraction with a dynamic, tiered summarization ledger."

keywords      = ["agents", "meetings", "harness", "summarization", "atomr"]
categories    = ["asynchronous"]
readme        = "README.md"

[features]
default = []
# Persist analyses through `crates/state`'s configured Checkpointer.
state = ["dep:atomr-agents-state", "atomr-agents-stt-harness/state"]

[dependencies]
atomr-agents-core          = { workspace = true }
atomr-agents-callable      = { workspace = true }
atomr-agents-observability = { workspace = true }
atomr-agents-tool          = { workspace = true }
atomr-agents-stt-core      = { workspace = true }
atomr-agents-stt-harness   = { workspace = true }
atomr-agents-state         = { workspace = true, optional = true }

async-trait  = { workspace = true }
tokio        = { workspace = true }
futures      = { workspace = true }
serde        = { workspace = true }
serde_json   = { workspace = true }
thiserror    = { workspace = true }
tracing      = { workspace = true }
parking_lot  = { workspace = true }
semver       = { workspace = true }
chrono       = { workspace = true }
uuid         = { workspace = true }
regex        = "1"

[dev-dependencies]
tokio = { workspace = true, features = ["full", "test-util"] }
