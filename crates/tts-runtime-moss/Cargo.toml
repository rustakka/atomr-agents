[package]
name        = "atomr-agents-tts-runtime-moss"
version.workspace     = true
edition.workspace     = true
rust-version.workspace = true
license.workspace     = true
repository.workspace  = true
homepage.workspace    = true
documentation.workspace = true
authors.workspace     = true
readme.workspace      = true
description = "MOSS-TTS local backend for atomr-agents (TTS / SFX / dialogue / voicegen / realtime)."

[dependencies]
atomr-agents-stt-core = { workspace = true }
atomr-agents-tts-core = { workspace = true }
atomr-agents-tts-audio = { workspace = true }
async-trait           = { workspace = true }
serde                 = { workspace = true }
serde_json            = { workspace = true }
thiserror             = { workspace = true }
tracing               = { workspace = true }
tokio                 = { workspace = true }
bytes                 = { workspace = true }
url                   = { workspace = true }
reqwest               = { workspace = true, optional = true }

[features]
default = []
# Enables the HTTP client to a co-hosted MOSS-TTS Python server
# (SGLang or a thin FastAPI wrapper). Without this feature the runner
# returns ModelLoad errors.
moss-http = ["reqwest"]
