[package]
name          = "atomr-agents-web-search-core"
version       = { workspace = true }
edition       = { workspace = true }
rust-version  = { workspace = true }
license       = { workspace = true }
repository    = { workspace = true }
homepage      = { workspace = true }
authors       = { workspace = true }
description   = "Provider-agnostic web-search trait, request/hit types, and a deterministic mock provider for tests."

keywords      = ["agents", "web-search", "tool", "atomr"]
