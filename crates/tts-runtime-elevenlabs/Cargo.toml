[package]
name          = "atomr-agents-tts-runtime-elevenlabs"
version       = { workspace = true }
edition       = { workspace = true }
rust-version  = { workspace = true }
license       = { workspace = true }
repository    = { workspace = true }
homepage      = { workspace = true }
authors       = { workspace = true }
description   = "ElevenLabs TTS backend (REST + WebSocket streaming + voice cloning + SFX) for atomr-agents."

keywords      = ["agents", "tts", "elevenlabs", "speech", "atomr"]
categories    = ["asynchronous", "multimedia::audio"]
readme        = "../../README.md"

[features]
default     = ["rustls"]
rustls      = ["atomr-agents-stt-remote-core/rustls"]
native-tls  = ["atomr-agents-stt-remote-core/native-tls"]
integration = []

[dependencies]
atomr-agents-stt-core         = { workspace = true }
atomr-agents-stt-remote-core  = { workspace = true }
atomr-agents-tts-core         = { workspace = true }

reqwest             = { workspace = true, features = ["stream", "multipart"] }
tokio               = { workspace = true, features = ["sync", "rt", "macros"] }
tokio-tungstenite   = { workspace = true, features = ["connect"] }
async-trait         = { workspace = true }
futures             = { workspace = true }
futures-util        = { workspace = true }
bytes               = { workspace = true }
serde               = { workspace = true }
serde_json          = { workspace = true }
secrecy             = { workspace = true }
url                 = { workspace = true }
tracing             = { workspace = true }
parking_lot         = { workspace = true }

[dev-dependencies]
futures = { workspace = true }
