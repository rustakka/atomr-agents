[package]
name          = "atomr-agents-tts-audio"
version       = { workspace = true }
edition       = { workspace = true }
rust-version  = { workspace = true }
license       = { workspace = true }
repository    = { workspace = true }
homepage      = { workspace = true }
authors       = { workspace = true }
description   = "Output-side audio for atomr-agents text-to-speech: PCM->WAV/Opus encoders, cpal speaker output, and stream-to-speaker pumps."

keywords      = ["agents", "tts", "audio", "encode", "speaker"]
categories    = ["multimedia::audio"]
readme        = "../../README.md"

[features]
default      = ["encode-wav"]
# WAV (RIFF/PCM) writer via hound — small, no system deps.
encode-wav   = ["dep:hound"]
# cpal speaker output (default-off; cpal needs platform audio dev headers).
speaker      = ["dep:cpal"]

[dependencies]
atomr-agents-stt-core  = { workspace = true }
atomr-agents-tts-core  = { workspace = true }

hound = { version = "3.5", optional = true }
cpal  = { version = "0.15", optional = true }

bytes        = { workspace = true }
tokio        = { workspace = true, features = ["sync", "rt", "macros"] }
futures      = { workspace = true }
futures-util = { workspace = true }
tracing      = { workspace = true }
thiserror    = { workspace = true }

[dev-dependencies]
tokio = { workspace = true }
atomr-agents-stt-audio = { workspace = true }
